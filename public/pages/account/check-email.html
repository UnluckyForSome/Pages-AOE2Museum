<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check your email - AoE2 Museum</title>
    <link rel="stylesheet" href="/assets/css/museum.css" />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var email = params.get("email");
        var target = "/?museum-auth=verify-pending";
        if (email) target += "&email=" + encodeURIComponent(email);
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p class="muted">Redirecting…</p>
  </body>
</html>

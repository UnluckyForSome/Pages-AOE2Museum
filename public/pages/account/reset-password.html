<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password - AoE2 Museum</title>
    <link rel="stylesheet" href="/assets/css/museum.css" />
  </head>
  <body data-account-page="reset-password">
    <nav class="site-nav" aria-label="Site"></nav>
    <main class="account-main">
      <div class="card card--narrow">
        <h1>Reset password</h1>
        <p id="reset-password-intro" class="muted">Choose a new password for your account.</p>
        <form id="reset-password-form" class="stack museum-auth-modal__fields" hidden>
          <label class="museum-auth-modal__field">
            <span class="museum-auth-modal__label">New password</span>
            <input
              class="museum-auth-modal__input"
              type="password"
              name="password"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </label>
          <label class="museum-auth-modal__field">
            <span class="museum-auth-modal__label">Confirm password</span>
            <input
              class="museum-auth-modal__input"
              type="password"
              name="password_confirm"
              required
              minlength="8"
              autocomplete="new-password"
            />
          </label>
          <p id="account-msg" class="form-msg" role="status"></p>
          <button type="submit" class="btn museum-auth-modal__submit">Update password</button>
        </form>
        <p class="museum-auth-modal__footer">
          <a href="/" data-museum-auth-open>Sign in</a>
        </p>
      </div>
    </main>
    <script src="/modules/site/museum-nav.js" defer></script>
    <script src="/modules/site/museum-auth-modal.js" defer></script>
    <script src="/assets/js/museum-auth.js" defer></script>
    <script src="/account/account.js" defer></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/assets/img/university.png" />
    <link rel="apple-touch-icon" href="/assets/img/university.png" />
    <meta name="apple-mobile-web-app-title" content="AOE2M" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
    <title>AoE2 Museum</title>
    <meta
      name="description"
      content="A small collection of Age of Empires II tools and archives. Minimap renderer, scenario archive, and more to come."
    />
    <link rel="stylesheet" href="/assets/css/museum.css" />
  </head>
  <body>
    <nav class="site-nav" aria-label="Site">
      <div class="site-nav__bar">
        <a class="site-nav__logo" href="/">
          <img class="site-nav__logo-mark" src="/assets/img/university.png" width="36" height="36" alt="" decoding="async" />
          <span class="site-nav__logo-text">AoE2 Museum</span>
        </a>
        <button
          type="button"
          class="site-nav__toggle"
          id="site-nav-toggle"
          aria-expanded="false"
          aria-controls="site-nav-menu"
          aria-label="Open menu"
        >
          <span class="site-nav__burger" aria-hidden="true">
            <span class="site-nav__burger-line"></span>
            <span class="site-nav__burger-line"></span>
            <span class="site-nav__burger-line"></span>
          </span>
        </button>
      </div>
      <div class="site-nav__backdrop" aria-hidden="true"></div>
      <div id="site-nav-menu" class="site-nav__drawer">
        <div class="site-nav__links">
          <a href="/" data-route-key="home">Home</a>
          <a href="/minimap/" data-route-key="minimap">McMinimap</a>
          <a href="/scenarios/" data-route-key="scenarios">Scenarios</a>
          <a href="/gif/" data-route-key="gif">GIFs</a>
          <a href="/campaignmanager/" data-route-key="campaignmanager">Campaigns</a>
          <a href="/originalmods/" data-route-key="originalmods">Original Mods</a>
          <a href="/contact/" data-route-key="contact">Contact</a>
        </div>
      </div>
    </nav>

    <main id="app-view" aria-live="polite">
      <header class="page-header">
        <div class="page-header__backdrop" aria-hidden="true"></div>
        <div class="page-header__inner">
          <h1 class="page-title">AoE2 Museum</h1>
          <div class="page-intro">
            <p>Loading exhibit...</p>
          </div>
        </div>
      </header>
    </main>

    <footer id="app-footer">AoE2 Museum</footer>

    <script src="/modules/site/museum-nav.js" defer></script>
    <script src="/assets/js/museum-auth.js" defer></script>
    <script src="/modules/site/location-state.js"></script>
    <script type="module" src="/modules/app-shell/app.js"></script>
  </body>
</html>
